aid: apipark
name: APIPark
description: APIPark is an open-source, cloud-native AI gateway and API developer portal that helps developers and enterprises
  manage, integrate, and deploy AI and API services. It supports 100+ AI models from all major AI providers, provides API
  lifecycle management, authentication, rate limiting, and cluster deployment for large-scale traffic. Teams can combine AI
  models with custom prompts to create new AI-powered services such as sentiment analysis, translation, or data analysis.
