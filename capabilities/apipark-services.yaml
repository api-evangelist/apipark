naftiko: 1.0.0-alpha2
info:
  label: APIPark API — Services
  description: 'APIPark API — Services. 2 operations. Lead operation: List Services. Self-contained Naftiko capability covering
    one Apipark business surface.'
  tags:
  - Apipark
  - Services
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APIPARK_API_KEY: APIPARK_API_KEY
capability:
  consumes:
  - type: http
    namespace: apipark-services
    baseUri: https://api.apipark.com/v1
    description: APIPark API — Services business capability. Self-contained, no shared references.
    resources:
    - name: services
      path: /services
      operations:
      - name: listservices
        method: GET
        description: List Services
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createservice
        method: POST
        description: Create Service
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.APIPARK_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: apipark-services-rest
    port: 8080
    description: REST adapter for APIPark API — Services. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/services
      name: services
      description: REST surface for services.
      operations:
      - method: GET
        name: listservices
        description: List Services
        call: apipark-services.listservices
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createservice
        description: Create Service
        call: apipark-services.createservice
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: apipark-services-mcp
    port: 9090
    transport: http
    description: MCP adapter for APIPark API — Services. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-services
      description: List Services
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: apipark-services.listservices
      outputParameters:
      - type: object
        mapping: $.
    - name: create-service
      description: Create Service
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: apipark-services.createservice
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
