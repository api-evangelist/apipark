naftiko: "1.0.0-alpha1"

info:
  name: APIPark Platform Management
  description: Services, AI models, teams, and subscribers via the APIPark API
  version: 1.0.0

binds:
  - name: APIPARK_API_KEY
    env: APIPARK_API_KEY

capability:
  consumes:
    - namespace: apipark
      type: http
      baseUri: "https://api.apipark.com/v1"
      authentication:
        type: apikey
        header: Authorization
        value: "{{APIPARK_API_KEY}}"
      resources:
        - name: services
          path: "/services"
          operations:
            - name: listServices
              method: GET
            - name: createService
              method: POST

        - name: aiModels
          path: "/ai-models"
          operations:
            - name: listAiModels
              method: GET

        - name: teams
          path: "/teams"
          operations:
            - name: listTeams
              method: GET

        - name: subscribers
          path: "/subscribers"
          operations:
            - name: listSubscribers
              method: GET

  exposes:
    - type: rest
      port: 8130
      namespace: apipark-rest
      resources:
        - path: "/services"
          name: services
          label: "List Services"
          description: "List all published API services on the APIPark platform"
          operations:
            - method: GET
              call: apipark.listServices
              outputParameters:
                - type: array
                  mapping: "$."
                  items:
                    type: object

        - path: "/ai-models"
          name: aiModels
          label: "List AI Models"
          description: "List all AI models available on the APIPark platform"
          operations:
            - method: GET
              call: apipark.listAiModels
              outputParameters:
                - type: array
                  mapping: "$."
                  items:
                    type: object

        - path: "/teams"
          name: teams
          label: "List Teams"
          description: "List all teams registered on the APIPark platform"
          operations:
            - method: GET
              call: apipark.listTeams
              outputParameters:
                - type: array
                  mapping: "$."
                  items:
                    type: object

        - path: "/subscribers"
          name: subscribers
          label: "List Subscribers"
          description: "List all API subscribers on the APIPark platform"
          operations:
            - method: GET
              call: apipark.listSubscribers
              outputParameters:
                - type: array
                  mapping: "$."
                  items:
                    type: object

    - type: mcp
      address: "0.0.0.0"
      port: 9130
      namespace: apipark
      description: "APIPark platform management tools for services, AI models, teams, and subscribers"
      tools:
        - name: list-services
          description: "List all published API services on the APIPark platform"
          hints:
            readOnly: true
          call: apipark.listServices
          outputParameters:
            - type: array
              mapping: "$."
              items:
                type: object

        - name: create-service
          description: "Publish a new API service on the APIPark platform"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: apipark.createService
          inputParameters:
            - name: body
              type: object
              required: true
              description: "Service definition"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-ai-models
          description: "List all AI models available on the APIPark platform"
          hints:
            readOnly: true
          call: apipark.listAiModels
          outputParameters:
            - type: array
              mapping: "$."
              items:
                type: object

        - name: list-teams
          description: "List all teams registered on the APIPark platform"
          hints:
            readOnly: true
          call: apipark.listTeams
          outputParameters:
            - type: array
              mapping: "$."
              items:
                type: object

        - name: list-subscribers
          description: "List all API subscribers and their subscription details"
          hints:
            readOnly: true
          call: apipark.listSubscribers
          outputParameters:
            - type: array
              mapping: "$."
              items:
                type: object
